<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Application Tracker</title>
    <!--
      GitHub Pages has no server-side routing, so a hard refresh on a deep link
      (e.g. /ApplicationTracker/board) lands here. This encodes the requested
      path into a query string and redirects to the app's index.html, where the
      snippet in index.html decodes it back. `pathSegmentsToKeep = 1` preserves
      the project-site base segment (the repo name).
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
